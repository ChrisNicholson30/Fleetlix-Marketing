<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 140" role="img" aria-label="Fleetlix reversed">
  <title>Fleetlix reversed</title>
  <desc>Fleetlix lockup for use on dark backgrounds: off-white wordmark with amber and cyan L letters preserved.</desc>
  <rect x="20" y="20" width="100" height="100" rx="14" fill="none" stroke="#F7F5F0" stroke-width="2"/>
  <rect x="44" y="38" width="12" height="44" fill="#FF8A00"/>
  <rect x="44" y="72" width="28" height="12" fill="#FF8A00"/>
  <rect x="84" y="58" width="12" height="44" fill="#0098C7"/>
  <rect x="68" y="90" width="28" height="12" fill="#0098C7"/>
  <text x="148" y="98" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="84" letter-spacing="-3.5" fill="#F7F5F0">F<tspan fill="#FF8A00">l</tspan>eet<tspan fill="#0098C7">l</tspan>ix</text>
</svg>
